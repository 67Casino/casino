<html lang="ru">

<meta charset="UTF-8">

<title>67Casino — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBnPmUMDLSS1pjFzE0aU46BB2h0sxkmUCg",
    authDomain: "casino-89385.firebaseapp.com",
    databaseURL: "https://casino-89385-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "casino-89385",
    storageBucket: "casino-89385.firebasestorage.app",
    messagingSenderId: "315653962787",
    appId: "1:315653962787:web:d2df833858d76ff9638596"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, user => { if (user) location.href = "game.html"; });

  function fakeEmail(u){ return u.toLowerCase().replace(/[^a-z0-9_]/g,'') + '@67casino.game'; }

  window.doLogin = async function() {
    const u = document.getElementById('loginUsername').value.trim();
    const p = document.getElementById('loginPassword').value;
    if (!u || !p){ showMsg('login','Заполни все поля','error'); return; }
    setLoad('loginBtn', true, loginIcon, '');
    try {
      await signInWithEmailAndPassword(auth, fakeEmail(u), p);
      showMsg('login','Добро пожаловать!','success');
      setTimeout(() => location.href = 'game.html', 900);
    } catch(e){
      let m = 'Что-то пошло не так';
      if (['auth/invalid-credential','auth/user-not-found','auth/wrong-password'].includes(e.code)) m = 'Неверный никнейм или пароль';
      else if (e.code === 'auth/too-many-requests') m = 'Слишком много попыток, подожди';
      showMsg('login', m, 'error');
      setLoad('loginBtn', false, loginIcon, 'Войти');
    }
  };

  window.doRegister = async function() {
    const u = document.getElementById('regUsername').value.trim();
    const p = document.getElementById('regPassword').value;
    if (!u || !p){ showMsg('reg','Заполни все поля','error'); return; }
    if (u.length < 3){ showMsg('reg','Никнейм минимум 3 символа','error'); return; }
    if (p.length < 6){ showMsg('reg','Пароль минимум 6 символов','error'); return; }
    setLoad('regBtn', true, regIcon, '');
    try {
      // Получаем следующий uid через счётчик в Firestore
      const counterRef = doc(db, 'meta', 'counter');
      let uid = 1;
      try {
        uid = await runTransaction(db, async (tx) => {
          const snap = await tx.get(counterRef);
          const next = snap.exists() ? (snap.data().count + 1) : 1;
          tx.set(counterRef, { count: next });
          return next;
        });
      } catch(e){
        alert('Counter error: ' + e.code + ' — ' + e.message);
      }

      const cred = await createUserWithEmailAndPassword(auth, fakeEmail(u), p);
      await updateProfile(cred.user, { displayName: u });
      await setDoc(doc(db, 'users', cred.user.uid), {
        username: u,
        uid: uid,
        balance: 1000,
        createdAt: new Date().toISOString()
      });
      showMsg('reg', `Аккаунт создан! Твой ID: #${uid}`, 'success');
      setTimeout(() => location.href = 'game.html', 1000);
    } catch(e){
      console.error('Reg error:', e.code, e.message);
      let m = 'Ошибка регистрации';
      if (e.code === 'auth/email-already-in-use') m = 'Такой никнейм уже занят';
      else if (e.code === 'auth/weak-password') m = 'Пароль слишком слабый';
      showMsg('reg', m, 'error');
      setLoad('regBtn', false, regIcon, 'Создать аккаунт');
    }
  };
</script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* Kill tap highlight everywhere on mobile */
* { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }

:root {
  --bg:      #030912;
  --blue2:   #1358b8;
  --accent:  #2d7aff;
  --soft:    #90bbff;
  --text:    #e6f0ff;
  --muted:   #4e6f9e;
  --card-bg: rgba(7,16,42,0.52);
  --border:  rgba(45,122,255,0.2);
  --inp-bg:  rgba(3,9,26,0.68);
}

html,body { height:100%; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--text); overflow:hidden; }
#bgCanvas { position:fixed; inset:0; z-index:0; }
.scene { position:relative; z-index:1; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }

/* ── CARD ── */
.card {
  width:100%; max-width:388px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 34px;
  padding: 38px 34px 34px;
  backdrop-filter: blur(44px) saturate(1.7) brightness(1.08);
  -webkit-backdrop-filter: blur(44px) saturate(1.7) brightness(1.08);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 60px 120px rgba(0,0,0,0.72),
    0 0 90px rgba(19,88,184,0.16),
    inset 0 1.5px 0 rgba(255,255,255,0.1),
    inset 0 -1px 0 rgba(0,0,0,0.35);
  animation: cardIn .65s cubic-bezier(.22,1,.36,1) both;
  position:relative; overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:0; left:12%; right:12%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
}
.card::after {
  content:''; position:absolute; top:-70px; right:-70px;
  width:200px; height:200px;
  background: radial-gradient(circle, rgba(45,122,255,0.09) 0%, transparent 70%);
  border-radius:50%; pointer-events:none;
}
@keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(.96)} to{opacity:1;transform:none} }

/* ── LOGO ── */
.logo { text-align:center; margin-bottom:26px; }
.logo-number-wrap { position:relative; display:inline-block; margin-bottom:4px; }

/* Blurred glow behind — subtle, not overpowering */
.logo-number-wrap::before {
  content: attr(data-text);
  position:absolute; inset:0;
  font-size:52px; font-weight:900; letter-spacing:-2px; line-height:1;
  background: linear-gradient(135deg, #7ab8ff 0%, #4488ee 40%, #2d7aff 65%, #7ab8ff 100%);
  background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: blur(8px) brightness(1.4);
  animation: shimmer 4s ease-in-out infinite;
  pointer-events:none; z-index:0;
  opacity: 0.6;
}
.logo-number {
  position:relative; z-index:1;
  display:inline-block;
  font-size:52px; font-weight:900; letter-spacing:-2px; line-height:1;
  background: linear-gradient(135deg, #b8d8ff 0%, #6aaeff 30%, #2d7aff 55%, #8ec8ff 80%, #d0eaff 100%);
  background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: shimmer 4s ease-in-out infinite;
  /* Much lighter drop-shadow than before */
  filter: drop-shadow(0 0 8px rgba(45,122,255,0.35));
}
@keyframes shimmer {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.logo h1 { font-size:14px; font-weight:800; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); }

/* ── TABS ── */
.tabs-wrap {
  position:relative; display:flex;
  background: rgba(3,9,26,0.58);
  border-radius:20px; padding:5px;
  margin-bottom:26px;
  border: 1px solid rgba(45,122,255,0.12);
  user-select:none;
}
.tab-slider {
  position:absolute; top:5px; bottom:5px;
  width:calc(50% - 5px); left:5px;
  background: linear-gradient(135deg,var(--blue2),var(--accent));
  border-radius:16px;
  box-shadow: 0 0 18px rgba(45,122,255,.35);
  transition: transform .4s cubic-bezier(.34,1.56,.64,1);
  will-change: transform;
}
.tab-slider.right { transform: translateX(calc(100% + 0px)); }
.tab {
  position:relative; z-index:1; flex:1;
  padding:10px 0; border:none; background:transparent;
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
  color:var(--muted); cursor:pointer;
  transition: color .3s; letter-spacing:.02em; border-radius:16px;
  display:flex; align-items:center; justify-content:center; gap:7px;
  /* no focus ring, no tap flash */
  outline:none; -webkit-appearance:none;
  user-select:none;
}
.tab:focus-visible { outline: 2px solid var(--accent); }
.tab.active { color:#fff; }
.tab svg { transition: opacity .3s; opacity:.55; }
.tab.active svg { opacity:1; }

/* ── PANELS ── */
.panels { position:relative; }
.panel { transition: opacity .32s ease, transform .32s cubic-bezier(.4,0,.2,1); }
.panel.hidden { position:absolute; top:0; left:0; right:0; opacity:0; pointer-events:none; }
.panel.hidden.slide-left  { transform:translateX(-26px); }
.panel.hidden.slide-right { transform:translateX(26px); }
.panel.active { opacity:1; transform:translateX(0); }

/* ── FIELD ── */
.field { margin-bottom:14px; }
.field label {
  display:flex; align-items:center; gap:7px;
  font-size:10.5px; color:var(--muted); font-weight:800;
  letter-spacing:.09em; text-transform:uppercase; margin-bottom:7px;
}
.field label svg { color: var(--accent); opacity:.75; flex-shrink:0; }
.input-wrap { position:relative; display:flex; align-items:center; }
.input-wrap input {
  width:100%;
  background: var(--inp-bg);
  border: 1.5px solid rgba(45,122,255,0.13);
  border-radius:18px;
  padding:13px 16px;
  font-family:'Nunito',sans-serif; font-size:14.5px; font-weight:600;
  color:var(--text); outline:none;
  transition: border-color .22s, box-shadow .22s, background .22s;
  -webkit-appearance:none;
}
.input-wrap input::placeholder { color:rgba(78,111,158,.45); font-weight:500; }
.input-wrap input:focus {
  border-color:var(--accent);
  background: rgba(5,12,32,.78);
  box-shadow: 0 0 0 4px rgba(45,122,255,.1), 0 0 28px rgba(45,122,255,.08);
}
.input-wrap input.has-toggle { padding-right:48px; }
.eye-btn {
  position:absolute; right:14px;
  background:none; border:none; cursor:pointer;
  color:var(--muted); padding:6px; border-radius:8px;
  display:flex; align-items:center; transition:color .2s;
  outline:none; -webkit-appearance:none;
}
.eye-btn:hover { color:var(--soft); }

/* ── BUTTON ── */
.btn-primary {
  width:100%; padding:14px; margin-top:6px;
  border:none; border-radius:20px;
  background: linear-gradient(135deg,var(--blue2) 0%,var(--accent) 100%);
  color:#fff; font-family:'Nunito',sans-serif;
  font-size:15px; font-weight:900; letter-spacing:.05em;
  cursor:pointer;
  transition: transform .2s, box-shadow .2s;
  box-shadow: 0 6px 28px rgba(45,122,255,.35), inset 0 1px 0 rgba(255,255,255,.15);
  display:flex; align-items:center; justify-content:center; gap:8px;
  position:relative; overflow:hidden;
  outline:none; -webkit-appearance:none; user-select:none;
}
.btn-primary::before {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background: linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
  transition: left .5s ease;
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 10px 36px rgba(45,122,255,.48); }
.btn-primary:hover::before { left:160%; }
.btn-primary:active { transform:translateY(0); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }

/* ── MSG — smooth height + 3s timer ── */
.msg {
  font-size:12.5px; font-weight:700;
  border-radius:16px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  margin-top: 0;
  padding: 0 14px;
  border: 1px solid transparent;
  transition:
    max-height .45s cubic-bezier(.4,0,.2,1),
    opacity    .35s ease,
    padding    .45s cubic-bezier(.4,0,.2,1),
    margin-top .45s cubic-bezier(.4,0,.2,1);
  position: relative;
  will-change: max-height, opacity;
}
.msg.visible {
  max-height: 80px;
  opacity: 1;
  padding: 10px 14px;
  margin-top: 12px;
}
.msg.error   { background:rgba(255,60,60,.09);  border-color:rgba(255,80,80,.2);  color:#ff8888; }
.msg.success { background:rgba(45,122,255,.09); border-color:rgba(45,122,255,.2); color:var(--soft); }
.msg-inner { overflow:hidden; display:flex; align-items:center; gap:10px; }
.msg-text { flex:1; }
.msg-timer { flex-shrink:0; width:20px; height:20px; opacity:0.45; }
.msg-timer svg { width:20px; height:20px; transform:rotate(-90deg); display:block; }
.timer-track { fill:none; stroke:rgba(255,100,100,0.18); stroke-width:2.5; }
.timer-arc   { fill:none; stroke:#ff7070; stroke-width:2.5; stroke-linecap:round; stroke-dasharray:56.55; stroke-dashoffset:0; }

/* ── SPINNER ── */
@keyframes spin { to{transform:rotate(360deg)} }
.spinner { display:inline-block; width:15px; height:15px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
</style>
</head>

<!-- PARTICLES — mobile-aware, reduced count on small screens -->
<script>
(function(){
  const cv = document.getElementById('bgCanvas');
  const ctx = cv.getContext('2d');
  let W, H, mouse = {x:-9999, y:-9999};
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768;
  // Fewer particles + shorter connection distance on mobile for perf
  const N    = isMobile ? 55  : 110;
  const CONN = isMobile ? 100 : 128;
  const ATT  = isMobile ? 100 : 155;
  const COLS = ['#2d7aff','#5599ff','#1358b8','#90bbff','#0d47a1','#60a5fa'];
  const ps = [];

  function resize(){ W = cv.width = innerWidth; H = cv.height = innerHeight; }
  addEventListener('resize', resize); resize();

  // Touch support for particle attraction
  addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
  addEventListener('touchmove', e => {
    if (e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
  }, {passive:true});
  addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; }, {passive:true});

  class P {
    constructor(){ this.init(true); }
    init(rand){
      this.x  = Math.random() * W;
      this.y  = rand ? Math.random() * H : (Math.random() > .5 ? -10 : H+10);
      this.vx = (Math.random() - .5) * .38;
      this.vy = (Math.random() - .5) * .38;
      this.r  = Math.random() * 1.8 + .4;
      this.col= COLS[Math.floor(Math.random() * COLS.length)];
      this.a  = Math.random() * .5 + .18;
      this.da = (Math.random() * .0025 + .001) * (Math.random() > .5 ? 1 : -1);
      // glow only on desktop — expensive on mobile
      this.glow = !isMobile && Math.random() > .82;
      this.gp = Math.random() * Math.PI * 2;
    }
    update(){
      const dx = mouse.x - this.x, dy = mouse.y - this.y, d = Math.hypot(dx, dy);
      if (d < ATT && d > 1){ const f = (ATT-d)/ATT * .012; this.vx += dx/d*f; this.vy += dy/d*f; }
      this.vx *= .993; this.vy *= .993;
      this.x += this.vx; this.y += this.vy;
      this.a += this.da;
      if (this.a < .06 || this.a > .85) this.da *= -1;
      this.gp += .04;
      if (this.x < -20) this.x = W+20;
      if (this.x > W+20) this.x = -20;
      if (this.y < -20) this.y = H+20;
      if (this.y > H+20) this.y = -20;
    }
    draw(){
      ctx.save(); ctx.globalAlpha = this.a;
      if (this.glow){
        const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*5+Math.sin(this.gp)*2);
        g.addColorStop(0, this.col); g.addColorStop(1,'transparent');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(this.x,this.y,this.r*5+Math.sin(this.gp)*2,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = this.col;
      ctx.shadowColor = this.col;
      ctx.shadowBlur = this.glow ? 8 : 3;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  for (let i = 0; i < N; i++) ps.push(new P());

  // On mobile skip the O(n²) shadow per line — just draw plain lines
  function lines(){
    for (let i = 0; i < ps.length; i++){
      for (let j = i+1; j < ps.length; j++){
        const a = ps[i], b = ps[j];
        const d = Math.hypot(a.x-b.x, a.y-b.y);
        if (d < CONN){
          ctx.save();
          ctx.globalAlpha = (1 - d/CONN) * .28;
          ctx.strokeStyle = '#2d7aff';
          ctx.lineWidth = .6;
          if (!isMobile){ ctx.shadowColor = '#2d7aff'; ctx.shadowBlur = 3; }
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
          ctx.restore();
        }
      }
    }
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    // background
    const g = ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.max(W,H)*.8);
    g.addColorStop(0,'#060f24'); g.addColorStop(.6,'#040b1a'); g.addColorStop(1,'#020609');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // mouse glow
    if (mouse.x > 0){
      const mg = ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,ATT*.7);
      mg.addColorStop(0,'rgba(45,122,255,0.06)'); mg.addColorStop(1,'transparent');
      ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mouse.x,mouse.y,ATT*.7,0,Math.PI*2); ctx.fill();
    }
    lines();
    ps.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

<!-- AUTH + MSG TIMER LOGIC -->
<script>
let currentTab = 'login';
const CIRC = 56.55;
const MSG_DURATION = 3000;
let activeTimer = null;

function killTimer(){
  if (activeTimer){ clearInterval(activeTimer); activeTimer = null; }
}

function showMsg(prefix, text, type){
  killTimer();

  const el    = document.getElementById(prefix + 'Msg');
  const txtEl = document.getElementById(prefix + 'MsgText');
  const arcId = prefix + 'Arc';
  const timerId = prefix + 'Timer';

  txtEl.textContent = text;

  // Reset arc immediately
  const arc = document.getElementById(arcId);
  if (arc) arc.style.strokeDashoffset = '0';

  // Show/hide timer widget (only for errors)
  const timerEl = document.getElementById(timerId);
  if (timerEl) timerEl.style.display = type === 'error' ? '' : 'none';

  el.className = 'msg ' + type;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.classList.add('visible');

      if (type === 'error' && arc){
        // Start countdown only once the open transition fully completes
        const onOpen = (e) => {
          if (e.propertyName !== 'max-height' && e.propertyName !== 'opacity') return;
          el.removeEventListener('transitionend', onOpen);
          killTimer();
          const start = performance.now();
          activeTimer = setInterval(() => {
            const progress = Math.min((performance.now() - start) / MSG_DURATION, 1);
            arc.style.strokeDashoffset = (progress * CIRC).toFixed(2);
            if (progress >= 1){
              killTimer();
              el.classList.remove('visible');
            }
          }, 30);
        };
        el.addEventListener('transitionend', onOpen);
      }
    });
  });
}

function hideMsg(prefix){
  const el = document.getElementById(prefix + 'Msg');
  el.classList.remove('visible');
}

function switchTab(tab){
  if (tab === currentTab) return;
  const slider = document.getElementById('tabSlider');
  const lp = document.getElementById('loginPanel'), rp = document.getElementById('registerPanel');
  const tl = document.getElementById('tabLogin'),   tr = document.getElementById('tabReg');
  if (tab === 'register'){
    slider.classList.add('right');
    tl.classList.remove('active'); tr.classList.add('active');
    lp.classList.remove('active'); lp.classList.add('hidden','slide-left');
    rp.classList.remove('hidden','slide-right','slide-left'); rp.classList.add('active');
  } else {
    slider.classList.remove('right');
    tr.classList.remove('active'); tl.classList.add('active');
    rp.classList.remove('active'); rp.classList.add('hidden','slide-right');
    lp.classList.remove('hidden','slide-left','slide-right'); lp.classList.add('active');
  }
  currentTab = tab;
}

function togglePass(id, btn){
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.querySelector('svg').innerHTML = show
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}



const loginIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>`;
const regIcon   = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>`;

function setLoad(id, loading, icon, label){
  const b = document.getElementById(id);
  b.disabled = loading;
  b.innerHTML = loading ? `<span class="spinner"></span> Загрузка...` : `${icon} ${label}`;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') currentTab === 'login' ? window.doLogin() : window.doRegister();
});
</script>
